<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Damaju · Estado de servicios</title>
<link rel="icon" href="https://damaju.com.co/wp-content/uploads/2026/03/ChatGPT_Image_13_mar_2026__05_36_39_p.m.-removebg-preview.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#060a10;
  --bg2:#0a0f1a;
  --sur:rgba(255,255,255,.038);
  --sur2:rgba(255,255,255,.065);
  --sur3:rgba(255,255,255,.09);
  --b:rgba(255,255,255,.07);
  --b2:rgba(255,255,255,.13);
  --b3:rgba(255,255,255,.2);
  --tx:#eef2ff;
  --tx2:#7c88a8;
  --tx3:#4a5370;
  --up:#00e676;
  --up2:rgba(0,230,118,.12);
  --up3:rgba(0,230,118,.06);
  --dn:#ff3d5a;
  --dn2:rgba(255,61,90,.12);
  --dn3:rgba(255,61,90,.05);
  --warn:#ffb300;
  --warn2:rgba(255,179,0,.12);
  --ac:#3b82f6;
  --ac2:rgba(59,130,246,.15);
  --r:12px;
  --r2:8px;
  --mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:'Inter',system-ui,sans-serif;font-size:14px;margin:0;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

/* Background */
.bg-orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.bg-orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(59,130,246,.08),transparent 70%);top:-200px;left:-150px;animation:drift 20s ease-in-out infinite alternate;}
.bg-orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(124,58,237,.07),transparent 70%);bottom:-150px;right:-100px;animation:drift 20s ease-in-out infinite alternate;animation-delay:-10s;}
.bg-orb3{width:300px;height:300px;background:radial-gradient(circle,rgba(0,230,118,.05),transparent 70%);top:50%;left:50%;animation:drift 25s ease-in-out infinite alternate;animation-delay:-5s;}
@keyframes drift{to{transform:translate(40px,25px) scale(1.1);}}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.013) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}

/* Header */
.hdr{background:rgba(6,10,16,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--b);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:12px;}
.logo img{height:28px;width:auto;}
.logo-sep{width:1px;height:16px;background:var(--b2);}
.logo-tag{font-family:var(--mono);font-size:10px;color:var(--tx3);letter-spacing:.16em;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--up3);border:1px solid rgba(0,230,118,.18);border-radius:999px;padding:5px 12px;font-family:var(--mono);font-size:10px;color:var(--up);letter-spacing:.04em;}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--up);animation:pulse-anim 2s ease-out infinite;}
@keyframes pulse-anim{0%{box-shadow:0 0 0 0 rgba(0,230,118,.7);}70%{box-shadow:0 0 0 7px rgba(0,230,118,0);}100%{box-shadow:0 0 0 0 rgba(0,230,118,0);}}
.hdr-time{font-family:var(--mono);font-size:10px;color:var(--tx3);}
.refresh-ring{width:20px;height:20px;cursor:pointer;opacity:.5;transition:opacity .2s;}
.refresh-ring:hover{opacity:1;}
.refresh-ring svg{animation:none;}
.refresh-ring.spinning svg{animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Status banner */
.status-banner{padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;font-weight:600;border-bottom:1px solid var(--b);transition:background .4s,border-color .4s;}
.status-banner.ok{background:linear-gradient(90deg,rgba(0,230,118,.06),rgba(0,230,118,.02));border-bottom-color:rgba(0,230,118,.12);}
.status-banner.down{background:linear-gradient(90deg,rgba(255,61,90,.06),rgba(255,61,90,.02));border-bottom-color:rgba(255,61,90,.12);}
.banner-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.banner-dot.ok{background:var(--up);box-shadow:0 0 8px var(--up);}
.banner-dot.down{background:var(--dn);box-shadow:0 0 8px var(--dn);animation:rp 1.5s ease-in-out infinite;}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(255,61,90,.5);}50%{box-shadow:0 0 0 6px rgba(255,61,90,0);}}

/* Layout */
.wrap{max-width:960px;margin:0 auto;padding:0 24px 64px;position:relative;z-index:1;}

/* Hero */
.hero{padding:40px 0 32px;}
.hero-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ac);margin-bottom:10px;opacity:0;animation:fade-up .5s ease forwards .05s;}
.hero-title{font-size:clamp(28px,4vw,42px);font-weight:800;line-height:1.08;letter-spacing:-.03em;margin-bottom:8px;opacity:0;animation:fade-up .5s ease forwards .12s;}
.hero-title .ok{color:var(--up);}
.hero-title .bad{color:var(--dn);}
.hero-sub{font-family:var(--mono);font-size:11px;color:var(--tx2);margin-bottom:28px;line-height:1.6;opacity:0;animation:fade-up .5s ease forwards .2s;}
@keyframes fade-up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* Stats row */
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;opacity:0;animation:fade-up .5s ease forwards .28s;}
.stat-card{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:14px 20px;min-width:90px;flex:1;transition:border-color .2s,background .2s;}
.stat-card:hover{border-color:var(--b2);background:var(--sur2);}
.stat-val{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.03em;margin-bottom:4px;}
.stat-val.green{color:var(--up);}
.stat-val.blue{color:var(--ac);}
.stat-val.red{color:var(--dn);}
.stat-val.gray{color:var(--tx2);}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);}

/* Uptime bar */
.uptime-bar-wrap{opacity:0;animation:fade-up .5s ease forwards .35s;}
.uptime-bar-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--tx3);margin-bottom:6px;}
.uptime-bar-lbl span:last-child{color:var(--tx2);font-weight:500;}
.uptime-track{height:4px;background:var(--sur);border-radius:999px;overflow:hidden;}
.uptime-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--up),#00b8d9);transition:width 1.4s cubic-bezier(.19,1,.22,1);}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--b);margin-bottom:14px;}
.section-title{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);}
.section-meta{font-family:var(--mono);font-size:10px;color:var(--tx3);}

/* Service grid */
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* Service card */
.svc-card{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px;display:flex;flex-direction:column;gap:14px;transition:border-color .22s,background .22s,transform .2s,box-shadow .2s;opacity:0;animation:fade-up .4s ease both;cursor:default;}
.svc-card:hover{border-color:var(--b2);background:var(--sur2);transform:translateY(-2px);box-shadow:0 1px 0 0 rgba(59,130,246,.4) inset,0 16px 40px rgba(0,0,0,.3);}
.svc-card.is-down{border-color:rgba(255,61,90,.2);background:var(--dn3);}
.svc-card.is-down:hover{box-shadow:0 1px 0 0 rgba(255,61,90,.5) inset,0 16px 40px rgba(255,61,90,.08);}
.svc-card.is-warn{border-color:rgba(255,179,0,.2);background:rgba(255,179,0,.04);}

/* Card top */
.card-top{display:flex;align-items:center;gap:10px;}
.status-ring{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:box-shadow .3s;}
.status-ring.up{background:var(--up3);border:1.5px solid rgba(0,230,118,.25);}
.status-ring.up:hover{box-shadow:0 0 0 4px rgba(0,230,118,.08);}
.status-ring.dn{background:var(--dn3);border:1.5px solid rgba(255,61,90,.3);animation:ring-pulse 2s ease-in-out infinite;}
.status-ring.warn{background:var(--warn2);border:1.5px solid rgba(255,179,0,.3);}
.status-ring.unknown{background:var(--sur);border:1.5px solid var(--b);}
@keyframes ring-pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,61,90,.25);}50%{box-shadow:0 0 0 6px rgba(255,61,90,0);}}
.status-dot{width:10px;height:10px;border-radius:50%;}
.status-dot.up{background:var(--up);box-shadow:0 0 8px rgba(0,230,118,.6);}
.status-dot.dn{background:var(--dn);box-shadow:0 0 8px rgba(255,61,90,.6);}
.status-dot.warn{background:var(--warn);box-shadow:0 0 8px rgba(255,179,0,.6);}
.status-dot.unknown{background:var(--tx3);}
.card-name-wrap{flex:1;min-width:0;}
.card-name{font-size:14px;font-weight:700;letter-spacing:-.015em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.card-code{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-top:2px;}
.status-badge{font-family:var(--mono);font-size:9px;font-weight:500;padding:3px 9px;border-radius:6px;letter-spacing:.07em;flex-shrink:0;}
.status-badge.up{background:var(--up3);color:var(--up);border:1px solid rgba(0,230,118,.18);}
.status-badge.dn{background:var(--dn2);color:var(--dn);border:1px solid rgba(255,61,90,.2);}
.status-badge.warn{background:var(--warn2);color:var(--warn);border:1px solid rgba(255,179,0,.2);}
.status-badge.unknown{background:var(--sur2);color:var(--tx3);border:1px solid var(--b);}

/* Sparklines */
.sparks-wrap{display:flex;flex-direction:column;gap:5px;}
.sparks{display:flex;align-items:flex-end;gap:1.5px;height:40px;}
.sp{flex:1;min-width:2px;border-radius:2px 2px 0 0;transition:opacity .1s;}
.sp.up{background:linear-gradient(180deg,rgba(0,230,118,.85),rgba(0,230,118,.15));}
.sp.dn{background:linear-gradient(180deg,rgba(255,61,90,.9),rgba(255,61,90,.2));}
.sp.em{background:rgba(255,255,255,.04);border-radius:2px;}
.sparks-lbl{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--tx3);}

/* Card bottom */
.card-bot{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-url{font-family:var(--mono);font-size:9px;color:var(--tx3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.card-metrics{display:flex;align-items:baseline;gap:12px;flex-shrink:0;}
.metric-uptime{font-family:var(--mono);font-size:16px;font-weight:700;line-height:1;}
.metric-uptime.hi{color:var(--up);}
.metric-uptime.md{color:var(--warn);}
.metric-uptime.lo{color:var(--dn);}
.metric-uptime.na{color:var(--tx3);}
.metric-ms{font-family:var(--mono);font-size:11px;color:var(--tx3);}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--sur) 25%,var(--sur2) 50%,var(--sur) 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.card-sk{background:var(--sur);border:1px solid var(--b);border-radius:var(--r);padding:18px 20px;display:flex;flex-direction:column;gap:14px;}

/* Incidents */
.incidents-wrap{margin-top:40px;}
.inc-timeline{position:relative;padding-left:20px;}
.inc-timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1px;background:var(--b2);}
.inc-item{position:relative;display:grid;grid-template-columns:90px 1fr;gap:12px;padding:14px 0;border-bottom:1px solid var(--b);opacity:0;animation:fade-up .4s ease both;}
.inc-item:last-child{border-bottom:none;}
.inc-item::before{content:'';position:absolute;left:-17px;top:20px;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--bg);}
.inc-item.resolved::before{background:var(--up3);border-color:var(--up);}
.inc-item.ongoing::before{background:var(--dn);border-color:var(--dn);box-shadow:0 0 6px rgba(255,61,90,.5);}
.inc-date{font-family:var(--mono);font-size:9px;color:var(--tx3);padding-top:3px;line-height:1.5;}
.inc-body{}
.inc-title{font-size:13px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.inc-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:4px;font-weight:500;}
.inc-badge.resolved{background:var(--up3);color:var(--up);border:1px solid rgba(0,230,118,.18);}
.inc-badge.ongoing{background:var(--dn2);color:var(--dn);border:1px solid rgba(255,61,90,.2);}
.inc-detail{font-family:var(--mono);font-size:10px;color:var(--tx2);line-height:1.5;}
.no-inc{display:flex;align-items:center;gap:12px;padding:20px 0;font-size:13px;color:var(--tx3);}
.no-inc-icon{width:32px;height:32px;border-radius:50%;background:var(--up3);border:1px solid rgba(0,230,118,.2);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

/* Footer */
footer{margin-top:56px;padding:20px 0;border-top:1px solid var(--b);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.footer-brand{font-weight:600;font-size:12px;color:var(--tx2);}
.footer-meta{font-family:var(--mono);font-size:10px;color:var(--tx3);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--b3);border-radius:4px;}

/* Responsive */
@media(max-width:640px){
  .services-grid{grid-template-columns:1fr;}
  .hero-title{font-size:28px;}
  .wrap{padding:0 16px 48px;}
  .hdr{padding:0 16px;}
  .status-banner{padding:8px 16px;}
  .stats-row{gap:8px;}
  .stat-card{min-width:calc(50% - 4px);}
}
</style>
</head>

<script>
const $=id=>document.getElementById(id);
const NAMES={
  damaju:'Tienda Principal',
  mando:'Panel de Control',
  ops:'Personal Manager',
  'app-marko':'Marko App',
  intercom:'Intercomunicador',
  luma:'Luma',
  marko:'Marko',
  tracker:'Tracker',
  fe:'Facturación Electrónica'
};

function getName(url){
  try{const sub=new URL(url).hostname.split('.')[0];return NAMES[sub]||(sub[0].toUpperCase()+sub.slice(1));}
  catch{return url;}
}
function fmtTime(iso){
  if(!iso)return'—';
  try{return new Date(iso).toLocaleString('es-CO',{timeZone:'America/Bogota',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',hour12:true});}
  catch{return iso;}
}
function timeAgo(iso){
  if(!iso)return'—';
  try{
    const d=Math.floor((Date.now()-new Date(iso))/1000);
    if(d<60)return'hace '+d+'s';
    if(d<3600)return'hace '+Math.floor(d/60)+' min';
    if(d<86400)return'hace '+Math.floor(d/3600)+'h';
    return fmtTime(iso);
  }catch{return iso;}
}
function calcUp(h){
  if(!h||!h.length)return null;
  return(h.filter(x=>x&&x.up).length/h.length*100).toFixed(1);
}
function avgMs(h){
  if(!h||!h.length)return null;
  const v=h.filter(x=>x&&x.up&&x.response_time>0);
  return v.length?Math.round(v.reduce((a,x)=>a+x.response_time,0)/v.length):null;
}
function sparks(hist){
  const r=(hist||[]).slice(-72);
  let h='';
  const ph=72-r.length;
  for(let i=0;i<ph;i++)h+=`<div class="sp em" style="height:${3+Math.floor(Math.random()*4)}px"></div>`;
  for(const c of r){
    if(!c){h+=`<div class="sp em" style="height:3px"></div>`;continue;}
    const ht=c.up?Math.min(40,Math.max(8,40-Math.round(c.response_time/80))):4;
    const lbl=c.up?`✓ ${c.response_time}ms · ${fmtTime(c.timestamp)}`:`✗ Caído · ${fmtTime(c.timestamp)}`;
    h+=`<div class="sp ${c.up?'up':'dn'}" style="height:${ht}px" title="${lbl}"></div>`;
  }
  return h;
}
function buildInc(svcs){
  const incs=[];
  for(const[url,svc]of Object.entries(svcs)){
    const hist=svc.history||[];
    let ds=null;
    for(const h of hist){
      if(!h)continue;
      if(!h.up&&ds===null)ds=h.timestamp;
      if(h.up&&ds!==null){
        const dur=new Date(h.timestamp)-new Date(ds);
        incs.push({name:getName(url),start:ds,end:h.timestamp,dur:dur<60000?Math.floor(dur/1000)+'s':Math.floor(dur/60000)+'m'});
        ds=null;
      }
    }
    if(ds!==null)incs.push({name:getName(url),start:ds,end:null,dur:'En curso'});
  }
  return incs.sort((a,b)=>new Date(b.start)-new Date(a.start)).slice(0,12);
}

function render(data){
  const svcs=data.services||{};
  const urls=Object.keys(svcs);
  const dnUrls=urls.filter(u=>svcs[u]?.current&&!svcs[u].current.up);
  const allOk=dnUrls.length===0;

  // Banner
  const banner=$('status-banner');
  const bannerDot=$('banner-dot');
  const bannerText=$('banner-text');
  banner.className='status-banner '+(allOk?'ok':'down');
  bannerDot.className='banner-dot '+(allOk?'ok':'down');
  bannerText.textContent=allOk
    ?`Todos los sistemas operando con normalidad — ${fmtTime(data.last_updated)}`
    :`${dnUrls.length} servicio${dnUrls.length>1?'s':''} con problemas detectados`;

  // Hero
  $('hero-title').innerHTML=allOk
    ?'Todos los servicios<br><span class="ok">operando normalmente</span>'
    :`${dnUrls.length} servicio${dnUrls.length>1?'s':''}<br><span class="bad">con problemas</span>`;
  $('hero-sub').textContent=`Última revisión ${timeAgo(data.last_updated)} · ${urls.length} servicios monitoreados`;

  // Stats
  $('stat-up').textContent=urls.length-dnUrls.length;
  const dnel=$('stat-dn');
  dnel.textContent=dnUrls.length;
  dnel.className='stat-val '+(dnUrls.length>0?'red':'green');

  let tu=0,cu=0,tm=0,cm=0;
  urls.forEach(u=>{
    const up=calcUp(svcs[u]?.history||[]);
    if(up!==null){tu+=parseFloat(up);cu++;}
    const ms=avgMs(svcs[u]?.history||[]);
    if(ms!==null){tm+=ms;cm++;}
  });
  const avgU=cu?(tu/cu).toFixed(1):'—';
  const avgM=cm?Math.round(tm/cm):'—';
  $('stat-uptime').textContent=avgU!=='—'?avgU+'%':'—';
  $('stat-ms').textContent=avgM!=='—'?avgM+'ms':'—';
  if(avgU!=='—'){$('bar-fill').style.width=avgU+'%';$('bar-pct').textContent=avgU+'%';}

  $('last-updated').textContent=timeAgo(data.last_updated);
  $('footer-ts').textContent='Último check: '+fmtTime(data.last_updated);
  $('section-count').textContent=`${urls.length} servicios · cada 5 min`;

  // Cards
  $('services').innerHTML=urls.map((url,i)=>{
    const svc=svcs[url]||{};
    const cur=svc.current;
    const isDown=cur&&!cur.up;
    const alertSent=svc.alert_sent;
    const up=calcUp(svc.history||[]);
    const upNum=up?parseFloat(up):null;
    const upCls=upNum===null?'na':upNum>=99?'hi':upNum<95?'lo':'md';
    const sCls=isDown?'dn':cur?'up':'unknown';
    const tagTxt=isDown?'CAÍDO':cur?'ACTIVO':'—';
    const ms=cur&&cur.response_time>0?cur.response_time:null;
    const code=cur&&cur.status_code>0?` · HTTP ${cur.status_code}`:'';
    const lastTs=cur?fmtTime(cur.timestamp):'—';
    return `<div class="svc-card${isDown?' is-down':''}" style="animation-delay:${i*.04}s">
      <div class="card-top">
        <div class="status-ring ${sCls}"><div class="status-dot ${sCls}"></div></div>
        <div class="card-name-wrap">
          <div class="card-name">${getName(url)}</div>
          <div class="card-code">${lastTs}${code}</div>
        </div>
        <span class="status-badge ${sCls}">${tagTxt}</span>
      </div>
      <div class="sparks-wrap">
        <div class="sparks">${sparks(svc.history||[])}</div>
        <div class="sparks-lbl"><span>72 chequeos anteriores</span><span>${up!==null?up+'% uptime':'sin datos'}</span></div>
      </div>
      <div class="card-bot">
        <span class="card-url">${url.replace('https://','').replace(/\/$/,'')}</span>
        <div class="card-metrics">
          ${up!==null?`<span class="metric-uptime ${upCls}">${up}%</span>`:'<span class="metric-uptime na">—</span>'}
          <span class="metric-ms">${ms!==null?ms+'ms':'—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Incidents
  const incs=buildInc(svcs);
  $('inc-count').textContent=incs.length?`${incs.length} incidente${incs.length>1?'s':''} recientes`:'Sin incidentes recientes';
  $('incidents').innerHTML=!incs.length
    ?`<div class="no-inc"><div class="no-inc-icon">✓</div><span>Sin incidentes detectados en los últimos 7 días</span></div>`
    :`<div class="inc-timeline">${incs.map((inc,i)=>`
      <div class="inc-item ${inc.end?'resolved':'ongoing'}" style="animation-delay:${i*.04}s">
        <div class="inc-date">${fmtTime(inc.start)}</div>
        <div class="inc-body">
          <div class="inc-title">
            ${inc.name}
            <span class="inc-badge ${inc.end?'resolved':'ongoing'}">${inc.end?'Resuelto':'En curso'}</span>
          </div>
          <div class="inc-detail">Duración: ${inc.dur}${inc.end?' · Recuperado: '+fmtTime(inc.end):' · Sigue activo'}</div>
        </div>
      </div>`).join('')}</div>`;
}

async function load(){
  const btn=$('refresh-btn');
  btn.classList.add('spinning');
  try{
    const res=await fetch('status.json?t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    render(await res.json());
  }catch(err){
    $('hero-title').innerHTML='<span class="bad">Error al cargar datos</span>';
    $('hero-sub').textContent=err.message;
  }finally{
    btn.classList.remove('spinning');
  }
}
function triggerLoad(){load();}
load();
setInterval(load,60000);
</script>
</body>
</html>
