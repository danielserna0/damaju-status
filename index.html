<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Damaju · Estado de servicios</title>
  <link rel="icon" href="https://damaju.com.co/wp-content/uploads/2026/02/Diseno-sin-titulo-2026-02-25T153654.803.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface2: #f0f2f5;
      --border: #e4e8ef;
      --text: #1a1d27;
      --text2: #4a5168;
      --muted: #8e97b0;
      --accent: #ff6b35;
      --accent2: #ff8c5a;
      --up: #22c55e;
      --up-bg: #f0fdf4;
      --up-border: #bbf7d0;
      --down: #ef4444;
      --down-bg: #fef2f2;
      --down-border: #fecaca;
      --warn: #f59e0b;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Outfit', sans-serif;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-lg: 0 4px 6px rgba(0,0,0,0.04), 0 10px 40px rgba(0,0,0,0.08);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* HEADER */
    .header-wrap {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    header {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo img { height: 36px; width: auto; display: block; }
    .logo-divider { width: 1px; height: 20px; background: var(--border); }
    .logo-label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .live-dot { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--up); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
    #last-updated { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    /* WRAP */
    .wrap { max-width: 860px; margin: 0 auto; padding: 32px 24px 72px; }

    /* HERO BANNER */
    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 28px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }
    .hero-left {}
    .hero-status-line { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .hero-icon { font-size: 28px; line-height: 1; }
    .hero-title { font-size: 22px; font-weight: 700; color: var(--text); }
    .hero-title span { color: var(--accent); }
    .hero-sub { font-size: 13px; color: var(--muted); font-family: var(--mono); }
    .hero-meta {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .meta-block { text-align: center; }
    .meta-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
    .meta-value.green { color: var(--up); }
    .meta-value.red { color: var(--down); }
    .meta-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
    .hero.all-up { border-color: var(--up-border); background: linear-gradient(135deg, #fff 60%, #f0fdf4); }
    .hero.has-down { border-color: var(--down-border); background: linear-gradient(135deg, #fff 60%, #fef2f2); }
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .status-pill.ok { background: var(--up-bg); color: var(--up); border: 1.5px solid var(--up-border); }
    .status-pill.down { background: var(--down-bg); color: var(--down); border: 1.5px solid var(--down-border); }
    .status-pill::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* SECTION */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .section-hint { font-family: var(--mono); font-size: 10px; color: var(--muted); }

    /* CARDS */
    .services { display: flex; flex-direction: column; gap: 8px; }
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s, border-color .2s, transform .15s;
    }
    .card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .card.is-down { border-color: var(--down-border); background: linear-gradient(135deg, #fff 70%, #fef2f2); }

    /* Status dot on card */
    .card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .card-dot.up { background: var(--up); box-shadow: 0 0 0 3px rgba(34,197,94,.15); }
    .card-dot.down { background: var(--down); box-shadow: 0 0 0 3px rgba(239,68,68,.15); animation: pulse 2s ease-in-out infinite; }
    .card-dot.unknown { background: var(--muted); }

    .card-info { flex: 1; min-width: 0; }
    .card-name { font-weight: 600; font-size: 14px; color: var(--text); }
    .card-url { font-family: var(--mono); font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Bars */
    .bars-wrap { flex: 2; display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .bars { display: flex; align-items: flex-end; gap: 2px; height: 32px; overflow: hidden; }
    .bar { flex: 1; border-radius: 3px; min-width: 2px; transition: opacity .15s; cursor: default; }
    .bar:hover { opacity: .8; }
    .bar.up { background: var(--up); }
    .bar.down { background: var(--down); }
    .bar.empty { background: var(--border); }
    .bars-labels { display: flex; justify-content: space-between; }
    .bars-label { font-family: var(--mono); font-size: 9px; color: var(--muted); }

    /* Right stats */
    .card-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .card-uptime { font-weight: 700; font-size: 15px; color: var(--text); font-family: var(--mono); }
    .card-uptime.high { color: var(--up); }
    .card-uptime.low { color: var(--down); }
    .card-ms { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      letter-spacing: 0.04em;
    }
    .badge.up { background: var(--up-bg); color: var(--up); border: 1px solid var(--up-border); }
    .badge.down { background: var(--down-bg); color: var(--down); border: 1px solid var(--down-border); }
    .badge.unknown { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* Footer */
    footer {
      margin-top: 48px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* Loading */
    .loading-state { padding: 48px 0; text-align: center; font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .hero { padding: 20px; }
      .card { flex-wrap: wrap; gap: 12px; }
      .bars-wrap { flex: 100%; order: 3; }
      .hero-meta { gap: 16px; }
      header { padding: 12px 16px; }
      .wrap { padding: 20px 16px 60px; }
    }
  </style>
</head>
<body>
  <div class="header-wrap">
    <header>
      <a class="logo" href="#">
        <img src="https://damaju.com.co/wp-content/uploads/2022/04/Diseno-sin-titulo-2026-02-25T152216.625.png" alt="Damaju" />
        <div class="logo-divider"></div>
        <span class="logo-label">Estado de servicios</span>
      </a>
      <div class="header-right">
        <div class="live-dot"><div class="dot"></div>En vivo</div>
        <div id="last-updated">—</div>
      </div>
    </header>
  </div>

  <div class="wrap">
    <div id="hero" class="hero">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="spinner"></div>
        <div>
          <div style="font-weight:600">Cargando estado…</div>
          <div style="font-size:12px;color:var(--muted);font-family:var(--mono)">Leyendo status.json</div>
        </div>
      </div>
    </div>

    <div class="section-head">
      <span class="section-label">Servicios monitoreados</span>
      <span class="section-hint" id="section-hint">últimas 7.5 h · 90 checks</span>
    </div>

    <div id="services" class="services">
      <div class="loading-state"><div class="spinner"></div><div>Obteniendo datos…</div></div>
    </div>

    <footer>
      <span>Damaju Status · GitHub Actions + Netlify</span>
      <span id="footer-ts">—</span>
    </footer>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    function fmtTime(iso) {
      if (!iso || iso === '—') return '—';
      try {
        return new Date(iso).toLocaleString('es-CO', {
          timeZone: 'America/Bogota',
          day: '2-digit', month: 'short',
          hour: '2-digit', minute: '2-digit', hour12: true
        });
      } catch { return iso; }
    }

    function serviceName(url) {
      try {
        const h = new URL(url).hostname.replace(/^www\./, '');
        const parts = h.split('.');
        const sub = parts.length > 2 ? parts[0] : parts[0];
        const name = sub.charAt(0).toUpperCase() + sub.slice(1);
        const known = { damaju: 'Tienda principal', mando: 'Panel de control', ops: 'Operaciones', 'app-marko': 'Marko App' };
        return known[sub] || name;
      } catch { return url; }
    }

    function calcUptime(history) {
      if (!history || !history.length) return null;
      return ((history.filter(h => h && h.up).length / history.length) * 100).toFixed(1);
    }

    function renderBars(history) {
      const recent = (history || []).slice(-90);
      const bars = [];
      const placeholder = 90 - recent.length;
      for (let i = 0; i < placeholder; i++) {
        const h = Math.floor(Math.random() * 10 + 10);
        bars.push(`<div class="bar empty" style="height:${h}px" title="Sin datos"></div>`);
      }
      for (const c of recent) {
        if (!c) { bars.push(`<div class="bar empty" style="height:10px"></div>`); continue; }
        const h = c.up ? Math.min(32, Math.max(12, Math.round(32 - (c.response_time / 150)))) : 10;
        const label = c.up
          ? `✓ ${c.response_time}ms · ${fmtTime(c.timestamp)}`
          : `✗ DOWN · ${c.status_code || 'timeout'} · ${fmtTime(c.timestamp)}`;
        bars.push(`<div class="bar ${c.up ? 'up' : 'down'}" style="height:${h}px" title="${label}"></div>`);
      }
      return `
        <div class="bars">${bars.join('')}</div>
        <div class="bars-labels">
          <span class="bars-label">7.5 h atrás</span>
          <span class="bars-label">ahora</span>
        </div>`;
    }

    function render(data) {
      const services = data.services || {};
      const urls = Object.keys(services);
      const downList = urls.filter(u => services[u]?.current && !services[u].current.up);
      const unknownList = urls.filter(u => !services[u]?.current);
      const allOk = downList.length === 0 && unknownList.length === 0;

      // Compute avg uptime
      let totalUptime = 0, countU = 0;
      urls.forEach(u => {
        const up = calcUptime(services[u]?.history || []);
        if (up !== null) { totalUptime += parseFloat(up); countU++; }
      });
      const avgUptime = countU ? (totalUptime / countU).toFixed(1) : '—';

      // Hero
      const hero = $('hero');
      if (allOk) {
        hero.className = 'hero all-up';
        hero.innerHTML = `
          <div class="hero-left">
            <div class="hero-status-line">
              <span class="hero-icon">🎉</span>
              <div>
                <div class="hero-title">¡Todo funciona <span>perfectamente</span></div>
                <div class="hero-sub">Última revisión hace ${Math.floor((Date.now() - new Date(data.last_updated)) / 60000)} min · Se actualiza automáticamente cada 5 min</div>
              </div>
            </div>
          </div>
          <div class="hero-meta">
            <div class="meta-block">
              <div class="meta-value green">${urls.length}</div>
              <div class="meta-label">Activos</div>
            </div>
            <div class="meta-block">
              <div class="meta-value green">${avgUptime}%</div>
              <div class="meta-label">Uptime hoy</div>
            </div>
            <div class="meta-block">
              <div class="meta-value">0</div>
              <div class="meta-label">Incidentes</div>
            </div>
          </div>`;
      } else {
        const inc = downList.length;
        hero.className = 'hero has-down';
        hero.innerHTML = `
          <div class="hero-left">
            <div class="hero-status-line">
              <span class="hero-icon">⚠️</span>
              <div>
                <div class="hero-title">Algunos servicios <span style="color:var(--down)">con problemas</span></div>
                <div class="hero-sub">Última revisión: ${fmtTime(data.last_updated)}</div>
              </div>
            </div>
          </div>
          <div class="hero-meta">
            <div class="meta-block">
              <div class="meta-value green">${urls.length - inc}</div>
              <div class="meta-label">Activos</div>
            </div>
            <div class="meta-block">
              <div class="meta-value">${avgUptime}%</div>
              <div class="meta-label">Uptime hoy</div>
            </div>
            <div class="meta-block">
              <div class="meta-value red">${inc}</div>
              <div class="meta-label">Incidentes</div>
            </div>
          </div>`;
      }

      // Timestamps
      const lu = fmtTime(data.last_updated);
      $('last-updated').textContent = `Act. ${lu}`;
      $('footer-ts').textContent = `Último check: ${lu}`;
      $('section-hint').textContent = `${urls.length} servicios · últimas 7.5 h · 90 checks`;

      if (!urls.length) {
        $('services').innerHTML = `<div class="loading-state">Sin datos aún. Espera el primer run de GitHub Actions (~5 min).</div>`;
        return;
      }

      $('services').innerHTML = urls.map(url => {
        const svc = services[url] || {};
        const cur = svc.current;
        const uptime = calcUptime(svc.history || []);
        const isDown = cur && !cur.up;
        const dotCls = !cur ? 'unknown' : cur.up ? 'up' : 'down';
        const badgeCls = !cur ? 'unknown' : cur.up ? 'up' : 'down';
        const badgeTxt = !cur ? 'PENDING' : cur.up ? 'Activo' : 'Caído';
        const uptimeNum = uptime ? parseFloat(uptime) : null;
        const uptimeCls = uptimeNum === null ? '' : uptimeNum >= 99 ? 'high' : uptimeNum < 90 ? 'low' : '';

        return `<div class="card${isDown ? ' is-down' : ''}">
          <div class="card-dot ${dotCls}"></div>
          <div class="card-info">
            <div class="card-name">${serviceName(url)}</div>
            <div class="card-url">${url}</div>
          </div>
          <div class="bars-wrap">
            ${renderBars(svc.history || [])}
          </div>
          <div class="card-stats">
            ${uptime !== null ? `<div class="card-uptime ${uptimeCls}">${uptime}%</div>` : ''}
            <div class="card-ms">${cur ? `${cur.response_time}ms` : '—'}</div>
            <span class="badge ${badgeCls}">${badgeTxt}</span>
          </div>
        </div>`;
      }).join('');
    }

    async function loadStatus() {
      try {
        const res = await fetch('status.json?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        render(await res.json());
      } catch (err) {
        $('hero').innerHTML = `
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:24px">⚠️</span>
            <div>
              <div style="font-weight:600">No se pudo cargar status.json</div>
              <div style="font-size:12px;color:var(--muted);font-family:var(--mono)">${err.message}</div>
            </div>
          </div>`;
      }
    }

    loadStatus();
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
