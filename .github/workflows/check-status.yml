name: Check Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run status check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_status.py

      - name: Commit updated status.json
        run: |
          git config user.name "Damaju Status Bot"
          git config user.email "bot@damaju.com.co"
          git add status.json
          git diff --staged --quiet || git commit -m "chore: update status $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
